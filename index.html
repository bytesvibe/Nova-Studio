<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NOVA Studio — Brands, products, and interfaces that scale</title>
    <meta name="description" content="A creative agency for brands, products, and interfaces. NOVA Studio designs and builds for startups, scale-ups, and global companies." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "/#organization",
            "name": "NOVA Studio",
            "url": "/",
            "logo": "/favicon.png",
            "description": "A creative agency for brands, products, and interfaces.",
            "sameAs": [
              "https://www.linkedin.com/company/nova-studio",
              "https://twitter.com/novastudio",
              "https://dribbble.com/novastudio"
            ],
            "contactPoint": [{
              "@type": "ContactPoint",
              "contactType": "customer support",
              "email": "hello@novastudio.com",
              "availableLanguage": ["English"]
            }]
          },
          {
            "@type": "WebSite",
            "@id": "/#website",
            "url": "/",
            "name": "NOVA Studio",
            "publisher": { "@id": "/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "/search?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
